name: jobquest
description: JobQuest – Practice Smart, Level Up. India-first quiz app for job seekers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Storage
  shared_preferences: ^2.2.2

  # Ads
  google_mobile_ads: ^4.0.0

  # UI / Animations
  flutter_animate: ^4.3.0

  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  package_info_plus: ^5.0.1
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/questions/
